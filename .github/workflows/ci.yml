name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bash syntax check
        run: |
          echo "=== Checking bash syntax ==="
          FAIL=0
          rm -f "$HOME/.factory/.session-tool-count" "$HOME/.factory/.session-read-files" "$HOME/.factory/.last-tool-error.json" 2>/dev/null
          for f in hooks/*.sh install.sh uninstall.sh; do
            if bash -n "$f"; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Validate JSON files
        run: |
          echo "=== Validating JSON ==="
          python -c "import json; json.load(open('.factory-plugin/plugin.json')); print('OK: plugin.json')"
          python -c "import json; json.load(open('hooks/hooks.json')); print('OK: hooks.json')"

      - name: Check for hardcoded paths
        run: |
          echo "=== Checking for hardcoded paths ==="
          if grep -rn '/home/' hooks/ rules/ AGENTS.md install.sh uninstall.sh 2>/dev/null | grep -v '.github/'; then
            echo "FAIL: Found hardcoded /home/ paths"
            exit 1
          fi
          echo "CLEAN: No hardcoded paths"

      - name: Check for secrets
        run: |
          echo "=== Scanning for secrets ==="
          python3 -c '
          import re, sys, os
          patterns = [
              r"AKIA[0-9A-Z]{16}",
              r"ghp_[a-zA-Z0-9]{36}",
          ]
          found = False
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in [".git", "node_modules"]]
              for fname in files:
                  if fname.endswith((".sh", ".md", ".json")):
                      path = os.path.join(root, fname)
                      try:
                          content = open(path).read()
                          for p in patterns:
                              matches = re.findall(p, content)
                              if matches:
                                  print(f"FAIL: Real secret found in {path}")
                                  found = True
                      except: pass
          if found:
              sys.exit(1)
          print("CLEAN: No real secrets found")
          '

      - name: Check for personal info
        run: |
          echo "=== Checking for personal info ==="
          if grep -rni 'paul\|vietnamese\|non-programmer' hooks/ rules/ AGENTS.md 2>/dev/null; then
            echo "FAIL: Personal info found"
            exit 1
          fi
          echo "CLEAN: No personal info"

      - name: Test hooks with simulated input
        run: |
          set +o pipefail
          echo "=== Testing hooks ==="
          FAIL=0
          rm -f "$HOME/.factory/.session-tool-count" "$HOME/.factory/.session-read-files" "$HOME/.factory/.last-tool-error.json" 2>/dev/null

          echo '--- remind.sh ---'
          OUTPUT=$(echo '{"prompt":"test","session_id":"ci"}' | bash hooks/remind.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "tdd-enforcement" && echo "OK: remind.sh injects TDD" || { echo "FAIL: remind.sh TDD"; FAIL=1; }
          echo "$OUTPUT" | grep -q "zero-tolerance" && echo "OK: remind.sh injects zero-tolerance" || { echo "FAIL: remind.sh zero-tolerance"; FAIL=1; }

          echo '--- post-tool.sh (Edit — JSON output) ---'
          OUTPUT=$(echo '{"tool_name":"Edit","tool_input":{"file_path":"/tmp/test.ts"},"tool_output":"ok"}' | bash hooks/post-tool.sh 2>/dev/null)
          echo "$OUTPUT" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert "additionalContext" in d["hookSpecificOutput"]; print("OK: valid JSON additionalContext")' 2>/dev/null || { echo "FAIL: post-tool.sh JSON"; FAIL=1; }

          echo '--- post-tool.sh (Read — no output) ---'
          OUTPUT=$(echo '{"tool_name":"Read","tool_input":{"file_path":"/tmp/x.ts"},"tool_output":"code"}' | bash hooks/post-tool.sh 2>/dev/null)
          [ -z "$OUTPUT" ] && echo "OK: Read no output" || { echo "FAIL: Read produced output"; FAIL=1; }

          echo '--- post-tool.sh (Empty Task) ---'
          OUTPUT=$(echo '{"tool_name":"Task","tool_input":{},"tool_output":""}' | bash hooks/post-tool.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "EMPTY TASK" && echo "OK: empty task detected" || { echo "FAIL: empty task"; FAIL=1; }

          echo '--- post-tool.sh (Execute error) ---'
          OUTPUT=$(echo '{"tool_name":"Execute","tool_input":{},"tool_output":"SyntaxError: bad"}' | bash hooks/post-tool.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "EXECUTION ERROR" && echo "OK: execute error" || { echo "FAIL: execute error"; FAIL=1; }

          echo '--- post-tool.sh (Clean execute) ---'
          OUTPUT=$(echo '{"tool_name":"Execute","tool_input":{},"tool_output":"All tests passed"}' | bash hooks/post-tool.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "EXECUTION ERROR" && { echo "FAIL: false positive"; FAIL=1; } || echo "OK: no false positive"

          echo '--- stop-guard.sh (first fire blocks) ---'
          STOP_EXIT=0; echo '{"stop_hook_active":false}' | bash hooks/stop-guard.sh >/dev/null 2>/dev/null || STOP_EXIT=$?
          [ "$STOP_EXIT" -eq 2 ] && echo "OK: first fire exit 2" || { echo "FAIL: stop first fire (got $STOP_EXIT)"; FAIL=1; }

          echo '--- stop-guard.sh (re-fire allows stop) ---'
          STOP_EXIT2=0; echo '{"stop_hook_active":true}' | bash hooks/stop-guard.sh >/dev/null 2>/dev/null || STOP_EXIT2=$?
          [ "$STOP_EXIT2" -eq 0 ] && echo "OK: re-fire exit 0" || { echo "FAIL: infinite loop (got $STOP_EXIT2)"; FAIL=1; }

          echo '--- pre-write-guard.sh (clean) ---'
          OUTPUT=$(echo '{"tool_name":"Create","tool_input":{"file_path":"/tmp/test.js","content":"const x = 1;"}}' | bash hooks/pre-write-guard.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "deny" && { echo "FAIL: clean blocked"; FAIL=1; } || echo "OK: clean allowed"

          echo '--- pre-write-guard.sh (.env blocked) ---'
          OUTPUT=$(echo '{"tool_name":"Create","tool_input":{"file_path":"/tmp/.env","content":"x"}}' | bash hooks/pre-write-guard.sh 2>/dev/null)
          echo "$OUTPUT" | grep -q "deny" && echo "OK: .env blocked" || { echo "FAIL: .env not blocked"; FAIL=1; }

          echo '--- pre-compact.sh ---'
          bash hooks/pre-compact.sh 2>/dev/null | grep -q "pre-compact-recovery" && echo "OK: pre-compact" || { echo "FAIL: pre-compact"; FAIL=1; }

          rm -f "$HOME/.factory/.session-tool-count" "$HOME/.factory/.session-read-files" "$HOME/.factory/.last-tool-error.json" 2>/dev/null
          exit $FAIL

      - name: Install shellcheck
        if: runner.os != 'Windows'
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            if [ "$(uname)" = "Darwin" ]; then
              brew install shellcheck
            else
              sudo apt-get install -y shellcheck
            fi
          fi

      - name: Install shellcheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install shellcheck -y

      - name: Shellcheck (advisory)
        continue-on-error: true
        run: |
          echo "=== Shellcheck ==="
          shellcheck -s bash -S warning hooks/*.sh install.sh uninstall.sh || true

      - name: Verify all rules exist
        run: |
          echo "=== Checking rules ==="
          EXPECTED=14
          ACTUAL=$(ls rules/*.md | wc -l)
          echo "Found $ACTUAL rule files (expected $EXPECTED)"
          if [ "$ACTUAL" -lt "$EXPECTED" ]; then
            echo "FAIL: Missing rule files"
            exit 1
          fi
          echo "OK: All rules present"
